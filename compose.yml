services:
  # HLAVNÍ APLIKACE (FRONTEND)
  frontend:
    build: 
      context: ./frontend
    ports:
      - "${PORT}:3000" # Mapuje port z platformy na vnitřní port Next.js
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=https://kurim.ithope.eu/v1
    depends_on:
      - backend
    networks:
      - app-network

  # API SERVER (BACKEND)
  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/gift_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=https://kurim.ithope.eu/v1
    depends_on:
      - db
    networks:
      - app-network

  # DATABÁZE
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=gift_db
    networks:
      - app-network
    # Na školním serveru nemusíš porty pro DB vystavovat ven (stačí vnitřní síť)

networks:
  app-network:
    driver: bridge
