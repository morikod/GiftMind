<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Neural Architect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gift Neural <span>Architect</span></h1>
            <p>Inovativní analýza osobnosti pro výběr dárků bez klišé.</p>
        </header>

        <div class="glass-card">
            <h3>Vyberte archetypy:</h3>
            <div id="tag-container" class="tags">
                <span class="tag" onclick="toggleTag(this)">#TechnoGamer</span>
                <span class="tag" onclick="toggleTag(this)">#EkoMinimalista</span>
                <span class="tag" onclick="toggleTag(this)">#Adrenalin</span>
                <span class="tag" onclick="toggleTag(this)">#Estet</span>
                <span class="tag" onclick="toggleTag(this)">#Kutil</span>
                <span class="tag" onclick="toggleTag(this)">#Sběratel</span>
            </div>
            
            <textarea id="desc" placeholder="Popište osobu vlastními slovy..."></textarea>
            <button id="magic-btn" onclick="startMagic()">GENEROVAT ARCHITEKTURU DÁRKU</button>
        </div>

        <div id="results" class="results-grid"></div>
    </div>

    <script>
        let selectedTags = [];

        function toggleTag(el) {
            el.classList.toggle('active');
            const tag = el.innerText;
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
            } else {
                selectedTags.push(tag);
            }
        }

        async function startMagic() {
            const btn = document.getElementById('magic-btn');
            const results = document.getElementById('results');
            btn.innerText = "Analyzuji neurální sítě...";
            
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    tags: selectedTags,
                    description: document.getElementById('desc').value
                })
            });
            
            const data = await response.json();
            results.innerHTML = '';
            
            data.gifts.forEach(gift => {
                results.innerHTML += `
                    <div class="gift-card">
                        <div class="vibe">${gift.vibe}</div>
                        <h4>${gift.title}</h4>
                        <p>${gift.reason}</p>
                    </div>
                `;
            });
            btn.innerText = "GENEROVAT DALŠÍ ARCHITEKTURU";
        }
    </script>
</body>
</html>
