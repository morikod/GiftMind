<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>CyberTerm RAG v2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="crt-overlay"></div>
    <div id="game-container">
        <div id="output" class="custom-scroll">
            <div>[ LOADING NEURAL INTERFACE... DONE ]</div>
            <div>[ SYSTEM ]: Inicializace dokončena.</div>
            <div>1. Nahrajte PDF (nepovinné).</div>
            <div>2. Napište téma a stiskněte EXECUTE.</div>
        </div>

        <div id="boss-ui" style="display:none;">
            <div class="boss-title">!!! SECURITY BOSS !!!</div>
            <div id="target-char">?</div>
            <div id="boss-progress">Sync: 0 / 5</div>
        </div>
        
        <div class="input-wrapper">
            <input type="file" id="file-input" style="display:none">
            <button onclick="document.getElementById('file-input').click()">UPLOAD</button>
            <input type="text" id="user-input" placeholder="Téma nebo A/B/C..." autofocus>
            <button id="send-btn">EXECUTE</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
